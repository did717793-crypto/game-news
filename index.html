<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAME PULSE — PM 대시보드</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    /* ── CSS VARIABLES ── */
    :root {
      --bg:#f4f5f7; --surface:#ffffff; --surface2:#f0f1f4; --border:#dde1e7;
      --text:#1e1e2e; --text2:#555770; --text3:#8889a0; --primary:#5c4ee8;
      --primary-soft:#ede9ff; --primary-dim:#8b7ff0; --accent-r:#e05555;
      --accent-g:#00a878; --accent-y:#e8a020; --accent-b:#3b82f6;
      --header-bg:#ffffff; --header-border:#dde1e7; --tag-bg:#ede9ff; --tag-color:#5c4ee8;
      --gantt-bg:#f8f9fb; --gantt-head:#eef0f4; --today-line:#e05555;
      --modal-overlay:rgba(0,0,0,0.35); --scrollbar:#c8ccd8; --scrollbar-hover:#a0a5c0;
    }
    [data-theme="dark"] {
      --bg:#0f0e1a; --surface:#1a1830; --surface2:#14122a; --border:#2d2850;
      --text:#e8e4ff; --text2:#a29bfe; --text3:#636e72; --primary:#6c5ce7;
      --primary-soft:#2d2850; --primary-dim:#9d8fff; --accent-r:#e17055;
      --accent-g:#00b894; --accent-y:#fdcb6e; --accent-b:#74b9ff;
      --header-bg:#1a1830; --header-border:#2d2850; --tag-bg:#2d2850; --tag-color:#a29bfe;
      --gantt-bg:#14122a; --gantt-head:#1a1830; --today-line:#e17055;
      --modal-overlay:rgba(0,0,0,0.6); --scrollbar:#3d3870; --scrollbar-hover:#6c5ce7;
    }

    body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;transition:background .2s,color .2s;}
    a{color:inherit;text-decoration:none;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:var(--surface2);}
    ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover);}

    /* ── HEADER ── */
    .g-header{background:var(--header-bg);border-bottom:1px solid var(--header-border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:300;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .logo{font-size:15px;font-weight:900;color:var(--primary);letter-spacing:-.3px;white-space:nowrap;}
    .logo span{color:var(--text);}
    .h-spacer{flex:1;}
    .h-stat{font-size:11px;color:var(--text3);white-space:nowrap;}
    .h-stat b{color:var(--primary);}
    .theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
    .theme-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

    /* ── KPI BAR ── */
    .kpi-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;position:sticky;top:52px;z-index:290;overflow-x:auto;}
    .kpi-bar::-webkit-scrollbar{height:0;}
    .kpi-item{display:flex;flex-direction:column;align-items:center;padding:8px 24px;border-right:1px solid var(--border);min-width:110px;cursor:pointer;transition:background .15s;position:relative;}
    .kpi-item:last-child{border-right:none;}
    .kpi-item:hover{background:var(--primary-soft);}
    .kpi-item.active{background:var(--primary-soft);}
    .kpi-label{font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap;margin-bottom:2px;}
    .kpi-val{font-size:24px;font-weight:900;line-height:1.1;}
    .kv-r{color:var(--accent-r);} .kv-g{color:var(--accent-g);} .kv-y{color:var(--accent-y);} .kv-b{color:var(--accent-b);}
    .kpi-panel{display:none;position:absolute;top:100%;left:0;min-width:260px;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:400;max-height:320px;overflow-y:auto;}
    .kpi-item.active .kpi-panel{display:block;}
    .kpi-panel-title{font-size:10px;font-weight:700;color:var(--text3);padding:8px 14px 4px;border-bottom:1px solid var(--border);}
    .kpi-panel-item{padding:7px 14px;font-size:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
    .kpi-panel-item:last-child{border-bottom:none;}
    .kpi-panel-item .game-name{font-weight:600;color:var(--text);flex:1;}
    .kpi-panel-item .game-date{font-size:11px;color:var(--text3);}
    .kpi-panel-item .game-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--tag-bg);color:var(--tag-color);white-space:nowrap;}
    .kpi-empty{padding:14px;font-size:12px;color:var(--text3);text-align:center;}

    /* ── MAIN TABS ── */
    .tab-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;position:sticky;top:102px;z-index:270;}
    .tab-btn{padding:10px 22px;font-size:13px;font-weight:700;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
    .tab-btn:hover{color:var(--text);}
    .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
    .tab-page{display:none;}
    .tab-page.active{display:block;}

    /* ── TAG CHIPS ── */
    .nc-tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;white-space:nowrap;}
    .tag-cat{background:var(--tag-bg);color:var(--tag-color);}
    .tag-et{background:var(--primary-soft);color:var(--primary);}
    .tag-genre{background:#e8f4e8;color:#2d7a2d;}
    [data-theme="dark"] .tag-genre{background:#1a3020;color:#4ade80;}
    .tag-src{background:var(--surface2);color:var(--text3);}
    .tag-new{background:rgba(224,85,85,.12);color:var(--accent-r);font-weight:900;}

    /* ── FILTER BAR (공용) ── */
    .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .filter-label{font-size:11px;font-weight:700;color:var(--text3);}
    .f-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;}
    .f-chip:hover{border-color:var(--primary);color:var(--primary);}
    .f-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    .filter-sep{width:1px;height:18px;background:var(--border);margin:0 4px;}

    /* ── TAB-1: 신작 기사 DATE BAR ── */
    .dr-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .dr-quick{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
    .dr-btn{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;}
    .dr-btn:hover{border-color:var(--primary);color:var(--primary);}
    .dr-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    .dr-sep{width:1px;height:18px;background:var(--border);margin:0 4px;}
    .dr-custom{display:flex;align-items:center;gap:6px;}
    .dr-custom input[type=date]{border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:12px;background:var(--surface);color:var(--text);outline:none;}
    .dr-custom input[type=date]:focus{border-color:var(--primary);}
    .dr-go{background:var(--primary);color:#fff;border:none;border-radius:5px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;}
    .dr-go:hover{opacity:.88;}
    .dr-count{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;}

    /* ── SEC-HD ── */
    .sec-hd{display:flex;align-items:center;gap:8px;padding:14px 20px 6px;}
    .sec-hd-label{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
    .sec-hd-count{font-size:11px;color:var(--text3);}
    .sec-title{font-size:12px;font-weight:700;color:var(--text3);padding:10px 20px 4px;text-transform:uppercase;letter-spacing:.5px;}

    /* ── HERO CARDS ── */
    .hero-section{padding:0 20px 4px;}
    .hero-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:8px;padding:16px 18px;cursor:pointer;transition:all .15s;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px;}
    .hero-card:hover{border-left-color:var(--accent-r);box-shadow:0 4px 16px rgba(92,78,232,.13);}
    .hero-card:last-child{margin-bottom:0;}
    .hero-left{flex:1;min-width:0;}
    .hero-tags{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
    .hero-title{font-size:15px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:5px;}
    .hero-summary{font-size:12px;color:var(--text2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
    .hero-meta{font-size:11px;color:var(--text3);margin-top:6px;}

    /* ── FEATURED CARDS ── */
    .featured-section{padding:0 20px 4px;}
    .feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
    .feat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s;}
    .feat-card:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(92,78,232,.1);}
    .feat-tags{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
    .feat-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:4px;}
    .feat-summary{font-size:12px;color:var(--text2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
    .feat-meta{font-size:11px;color:var(--text3);margin-top:5px;}

    /* ── NORMAL LIST ── */
    .list-section{padding:0 20px 20px;}
    .list-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
    .list-card:hover{border-color:var(--primary);}
    .list-card:last-child{margin-bottom:0;}
    .lc-left{flex:1;min-width:0;}
    .lc-tags{display:flex;gap:4px;margin-bottom:3px;flex-wrap:wrap;}
    .lc-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
    .lc-right{font-size:11px;color:var(--text3);white-space:nowrap;}

    /* ── TAB-2: 신작 일정 MONTH NAV ── */
    .month-nav{background:var(--surface2);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:8px;}
    .month-nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;}
    .month-nav-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
    .month-qbtn{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 9px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;}
    .month-qbtn:hover{border-color:var(--primary);color:var(--primary);}
    .month-qbtn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    .month-label{font-size:13px;font-weight:800;color:var(--primary);}
    .mns{flex:1;}

    /* ── CALENDAR (신작 일정 탭) ── */
    .cal-wrap{margin:12px 20px 20px;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border);border-left:1px solid var(--border);}
    .cal-dow{background:var(--surface2);font-size:10px;font-weight:800;color:var(--text3);text-align:center;padding:5px 0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
    .cal-cell{min-height:88px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;background:var(--surface);vertical-align:top;}
    .cal-cell.out-month{background:var(--surface2);}
    .cal-cell.out-month .cal-date{color:var(--text3);opacity:.5;}
    .cal-cell.is-today .cal-date{background:var(--primary);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:900;}
    .cal-date{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
    .cal-pill{font-size:10px;font-weight:700;border-radius:3px;padding:1px 5px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block;color:#fff;transition:opacity .15s;}
    .cal-pill:hover{opacity:.80;}
    .cal-empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px;}
    /* 이벤트 타입별 색상 */
    .et-출시{background:#e05555;} .et-OBT{background:#3b82f6;} .et-CBT{background:#00a878;}
    .et-사전예약{background:#e8a020;} .et-신규서버{background:#9b59b6;}
    .et-얼리액세스{background:#636e72;} .et-소프트론칭{background:#e91e63;}
    .et-default{background:#8889a0;}

    /* ── TAB-3: 업계 뉴스 ── */
    .ind-filter{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 20px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
    .industry-list{padding:12px 20px;display:flex;flex-direction:column;gap:6px;}
    .ind-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;transition:all .15s;}
    .ind-card:hover{border-color:var(--primary);}
    .ind-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
    .ind-cat{font-size:10px;font-weight:700;color:var(--tag-color);background:var(--tag-bg);padding:1px 6px;border-radius:10px;white-space:nowrap;}
    .ind-title{font-size:13px;font-weight:600;color:var(--text);flex:1;}
    .ind-meta{font-size:11px;color:var(--text3);}

    /* ── MODAL ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:900;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border-radius:12px;max-width:680px;width:calc(100% - 32px);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);}
    .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
    .modal-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
    .modal-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3;}
    .modal-close{margin-left:auto;background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;line-height:1;padding:2px;flex-shrink:0;}
    .modal-close:hover{color:var(--text);}
    .modal-body{padding:16px 20px;overflow-y:auto;flex:1;}
    .modal-meta{font-size:11px;color:var(--text3);margin-bottom:12px;}
    .modal-summary{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;padding:10px 12px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--primary);}
    .modal-body-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
    .modal-link{display:inline-block;margin-top:12px;color:var(--primary);font-size:12px;font-weight:600;text-decoration:underline;}

    /* ── SKELETON / EMPTY ── */
    .skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    .skel-card{height:70px;margin-bottom:8px;}
    .empty{padding:40px 20px;text-align:center;color:var(--text3);}
    .empty-icon{font-size:36px;margin-bottom:8px;}
    .empty-msg{font-size:13px;}

  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="g-header">
  <div class="logo">GAME<span>PULSE</span></div>
  <div class="h-spacer"></div>
  <span class="h-stat" id="h-stat">로딩 중...</span>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙 다크</button>
</header>

<!-- ── KPI BAR ── -->
<div class="kpi-bar" id="kpi-bar">
  <div class="kpi-item" id="kpi-launch" onclick="toggleKpi('kpi-launch')">
    <div class="kpi-label">오늘 출시</div>
    <div class="kpi-val kv-r" id="kv-launch">—</div>
    <div class="kpi-panel" id="kp-launch">
      <div class="kpi-panel-title">오늘 출시 게임</div>
      <div id="kpl-launch"><div class="kpi-empty">데이터 로딩 중...</div></div>
    </div>
  </div>
  <div class="kpi-item" id="kpi-cbt" onclick="toggleKpi('kpi-cbt')">
    <div class="kpi-label">진행중 CBT</div>
    <div class="kpi-val kv-g" id="kv-cbt">—</div>
    <div class="kpi-panel" id="kp-cbt">
      <div class="kpi-panel-title">CBT 진행 게임</div>
      <div id="kpl-cbt"><div class="kpi-empty">데이터 로딩 중...</div></div>
    </div>
  </div>
  <div class="kpi-item" id="kpi-week" onclick="toggleKpi('kpi-week')">
    <div class="kpi-label">이번주 신작</div>
    <div class="kpi-val kv-y" id="kv-week">—</div>
    <div class="kpi-panel" id="kp-week">
      <div class="kpi-panel-title">이번주 출시 게임</div>
      <div id="kpl-week"><div class="kpi-empty">데이터 로딩 중...</div></div>
    </div>
  </div>
  <div class="kpi-item" id="kpi-pre" onclick="toggleKpi('kpi-pre')">
    <div class="kpi-label">사전예약중</div>
    <div class="kpi-val kv-b" id="kv-pre">—</div>
    <div class="kpi-panel" id="kp-pre">
      <div class="kpi-panel-title">사전예약 게임</div>
      <div id="kpl-pre"><div class="kpi-empty">데이터 로딩 중...</div></div>
    </div>
  </div>
</div>

<!-- ── MAIN TABS ── -->
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('articles',this)">📰 신작 기사</button>
  <button class="tab-btn" onclick="switchTab('schedule',this)">📅 신작 일정</button>
  <button class="tab-btn" onclick="switchTab('industry',this)">🏢 업계 뉴스</button>
</nav>

<!-- ══════════════ TAB 1: 신작 기사 ══════════════ -->
<div class="tab-page active" id="tab-articles">
  <!-- 날짜 필터 -->
  <div class="dr-bar">
    <div class="dr-quick">
      <button class="dr-btn active" data-range="yesterday" onclick="setQuickRange(this)">어제</button>
      <button class="dr-btn" data-range="7days"     onclick="setQuickRange(this)">최근 7일</button>
      <button class="dr-btn" data-range="thismonth" onclick="setQuickRange(this)">이번달</button>
    </div>
    <div class="dr-sep"></div>
    <div class="dr-custom">
      <input type="date" id="dr-start">
      <span style="color:var(--text3);font-size:13px">~</span>
      <input type="date" id="dr-end">
      <button class="dr-go" onclick="applyDateRange()">조회</button>
    </div>
    <span class="dr-count" id="dr-count"></span>
  </div>

  <!-- Hero (상위 3) -->
  <div class="sec-hd" id="hero-hd" style="display:none;">
    <span class="sec-hd-label">🔥 주요 신작</span>
    <span class="sec-hd-count" id="hero-count"></span>
  </div>
  <div class="hero-section" id="hero-section"></div>

  <!-- Featured -->
  <div class="sec-hd" id="feat-hd" style="display:none;">
    <span class="sec-hd-label">📌 신작 기사</span>
    <span class="sec-hd-count" id="feat-count"></span>
  </div>
  <div class="featured-section" id="featured-section">
    <div class="feat-grid" id="feat-grid"></div>
  </div>

  <!-- List -->
  <div class="sec-hd" id="list-hd" style="display:none;">
    <span class="sec-hd-label">📄 전체 목록</span>
    <span class="sec-hd-count" id="list-count"></span>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
var DATA_PATH = 'data/';
var DATES_URL = DATA_PATH + 'dates.json';

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
var ALL_ARTICLES = [];
var DATES_LIST   = [];
var ACTIVE_TAB   = 'articles'; // 'articles' | 'schedule' | 'industry'

// TAB-1 신작기사 날짜 범위
var RANGE_START = null;
var RANGE_END   = null;

// TAB-2 신작일정 월 필터
var CUR_MONTH    = { y: new Date().getFullYear(), m: new Date().getMonth() + 1 };
var TODAY_MONTH  = { y: new Date().getFullYear(), m: new Date().getMonth() + 1 };
var ETYPE_FILTER = '전체';

// TAB-3 업계뉴스 카테고리
var IND_CAT_FILTER = '전체';

// ═══════════════════════════════════════════════════════════════════════════
// KEYWORDS & CLASSIFIERS
// ═══════════════════════════════════════════════════════════════════════════
var NEW_ET  = new Set(['사전예약','CBT','OBT','출시','신규서버','얼리액세스','소프트론칭']);
var SAFE_ET = new Set(['사전예약','CBT','OBT','신규서버','얼리액세스']);

var EXCL_HARD = [
  '신규 캐릭터','신규캐릭터','캐릭터 출시','캐릭터출시',
  '콜라보','콜라버레이션','카페 콜라보','반주년','기념 이벤트','기념일',
  '협업 이벤트','신규 스킨','스킨 출시',
  '신규 영웅','영웅 출시','신규 직업','직업 추가','클래스 추가',
  '다운로드 순위','매출 순위','앱스토어 순위','구글플레이 순위',
  '신규 장비','장비 추가','신규 펫','펫 추가','매출 집계','글로벌 매출'
];
var EXCL_SOFT = [
  '업데이트','패치','밸런스','이벤트 시작','이벤트 오픈',
  '시즌 시작','시즌 오픈','점검','신규 콘텐츠','캐릭터 소개','캐릭터 공개',
  '대규모 업데이트','신규 맵','신규 던전','신규 레이드'
];
var IND_CATS = new Set([
  '업계 동향','IR','인사','M&A','규제','인터뷰','채용','기술',
  '실적','투자','법률','시장','통계','행사','전시','파트너십','지재권'
]);

// 업계뉴스 카테고리 맵
var IND_CAT_MAP = {
  '전체':    null,
  '업계 동향': new Set(['업계 동향','시장','통계','행사','전시']),
  'IR':      new Set(['IR','실적','투자']),
  '인사':    new Set(['인사','채용']),
  'M&A':     new Set(['M&A','파트너십']),
  '규제':    new Set(['규제','법률','지재권']),
  '기술':    new Set(['기술']),
  '기타':    null
};

// ═══════════════════════════════════════════════════════════════════════════
// NORMALIZE: JSON 스키마 정규화 (site→source_name, category→cat_html 등)
// ═══════════════════════════════════════════════════════════════════════════
function normalizeArticle(a) {
  if (!a.cat_html    && a.category) a.cat_html    = a.category;
  if (!a.source_name && a.site)     a.source_name = a.site;
  if (!a.body_text   && a.body)     a.body_text   = a.body;
  if (!a.link        && a.url)      a.link        = a.url;
  if (!a.cleaned_title && a.title)  a.cleaned_title = a.title;
  return a;
}

// ═══════════════════════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════════════════════
function toggleTheme() {
  var html = document.documentElement;
  var dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = dark ? '🌙 다크' : '☀️ 라이트';
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function cleanT(t) {
  if (!t) return '';
  var prev;
  do { prev = t; t = t.replace(/^[\[\(【《〈][^\]\)】》〉]*[\]\)】》〉]\s*/, ''); } while (t !== prev);
  return t.trim();
}

function compressTitle(t) {
  if (!t) return '';
  t = cleanT(t);
  t = t.replace(/,?\s*(정식|글로벌|한국|공식|국내|해외|아시아)?\s*출시\s*(확정|예정|일정|오픈)?.*$/i, '');
  t = t.replace(/,?\s*사전예약\s*(시작|오픈|진행|실시|개시).*$/i, '');
  t = t.replace(/,?\s*(CBT|OBT|클로즈드\s*베타|오픈\s*베타)\s*(시작|오픈|진행|실시|개시)?.*$/i, '');
  t = t.replace(/,?\s*얼리\s*액세스.*$/i, '');
  t = t.replace(/,?\s*(모바일|PC|콘솔|스팀|Steam|Android|iOS).*$/i, '');
  t = t.replace(/,?\s*\d{4}년\s*\d{1,2}월.*$/i, '');
  var quoted = t.match(/['"『「《]([^'"』」》]{2,})['"』」》]/);
  if (quoted) t = quoted[1];
  t = t.replace(/[,，。.\s]+$/, '').trim();
  if (t.length > 24) t = t.slice(0, 22) + '…';
  return t || cleanT(arguments[0]);
}

function kst(s) {
  if (!s) return null;
  var d;
  if (s.indexOf('T') > 0)      d = new Date(s);
  else if (s.indexOf(' ') > 0) d = new Date(s.replace(' ','T') + ':00+09:00');
  else                          d = new Date(s + 'T00:00:00+09:00');
  return isNaN(d) ? null : d;
}

function fmtDate(s) {
  if (!s) return '';
  var d = kst(s);
  if (!d) return s;
  return (d.getMonth()+1) + '/' + d.getDate();
}

function today0() {
  var n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function today() { return today0(); }

function isoDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseIso(s) {
  if (!s) return null;
  var p = s.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}

function articleDate(a) {
  var d = kst(a.pub_date || a.collected_at || '');
  if (!d) return null;
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function weekRange() {
  var t = today0();
  var dow = t.getDay();
  var mon = new Date(t); mon.setDate(t.getDate() - (dow === 0 ? 6 : dow - 1));
  var sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { mon: mon, sun: sun };
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB-1 날짜 필터
// ═══════════════════════════════════════════════════════════════════════════
function inRange(a) {
  if (!RANGE_START && !RANGE_END) return true;
  var d = articleDate(a);
  if (!d) return false;
  var s = RANGE_START || new Date(0);
  var e = RANGE_END   || new Date(9999, 0, 1);
  return d >= s && d <= e;
}

function setQuickRange(btn) {
  var key = btn.dataset.range;
  var t = today0(), s, e;
  if      (key === 'yesterday') { s = e = new Date(t.getFullYear(), t.getMonth(), t.getDate()-1); }
  else if (key === '7days')     { s = new Date(t.getFullYear(), t.getMonth(), t.getDate()-6); e = t; }
  else if (key === 'thismonth') { s = new Date(t.getFullYear(), t.getMonth(), 1); e = t; }
  else                          { s = null; e = null; }
  RANGE_START = s;
  RANGE_END   = e;
  document.getElementById('dr-start').value = s ? isoDate(s) : '';
  document.getElementById('dr-end').value   = e ? isoDate(e) : '';
  document.querySelectorAll('.dr-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if (ACTIVE_TAB === 'articles') renderArticlesTab();
}

function applyDateRange() {
  RANGE_START = parseIso(document.getElementById('dr-start').value);
  RANGE_END   = parseIso(document.getElementById('dr-end').value);
  document.querySelectorAll('.dr-btn').forEach(function(b){ b.classList.remove('active'); });
  if (ACTIVE_TAB === 'articles') renderArticlesTab();
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB-2 월 네비
// ═══════════════════════════════════════════════════════════════════════════
function updateMonthLabel() {
  var el = document.getElementById('month-label');
  if (el) el.textContent = CUR_MONTH.y + '년 ' + CUR_MONTH.m + '월';
}

function updateMonthNavActive() {
  var t = new Date();
  var ty = t.getFullYear(), tm = t.getMonth() + 1;
  var map = { 'mnq-2': -2, 'mnq-1': -1, 'mnq0': 0, 'mnq1': 1 };
  Object.keys(map).forEach(function(id) {
    var rel = map[id];
    var ey = ty, em = tm + rel;
    if (em > 12) { em -= 12; ey++; } if (em < 1) { em += 12; ey--; }
    var btn = document.getElementById(id);
    if (btn) btn.classList.toggle('active', CUR_MONTH.y === ey && CUR_MONTH.m === em);
  });
}

function jumpToRelMonth(delta) {
  var t = new Date();
  var y = t.getFullYear(), m = t.getMonth() + 1 + delta;
  if (m > 12) { m -= 12; y++; } if (m < 1) { m += 12; y--; }
  CUR_MONTH = { y: y, m: m };
  updateMonthLabel(); updateMonthNavActive();
  if (ACTIVE_TAB === 'schedule') renderScheduleTab();
  else if (ACTIVE_TAB === 'industry') renderIndustryTab();
}

function jumpToToday() {
  CUR_MONTH = { y: TODAY_MONTH.y, m: TODAY_MONTH.m };
  updateMonthLabel(); updateMonthNavActive();
  if (ACTIVE_TAB === 'schedule') renderScheduleTab();
  else if (ACTIVE_TAB === 'industry') renderIndustryTab();
}

function shiftMonth(d) {
  CUR_MONTH.m += d;
  if (CUR_MONTH.m > 12) { CUR_MONTH.m = 1; CUR_MONTH.y++; }
  if (CUR_MONTH.m < 1)  { CUR_MONTH.m = 12; CUR_MONTH.y--; }
  updateMonthLabel(); updateMonthNavActive();
  if (ACTIVE_TAB === 'schedule') renderScheduleTab();
  else if (ACTIVE_TAB === 'industry') renderIndustryTab();
}

function getMonthArticles() {
  var mStart = new Date(CUR_MONTH.y, CUR_MONTH.m - 1, 1);
  var mEnd   = new Date(CUR_MONTH.y, CUR_MONTH.m, 0);
  return ALL_ARTICLES.filter(function(a) {
    var pubD = kst(a.pub_date || a.collected_at || '');
    var esD  = kst(a.event_start || '');
    var eeD  = kst(a.event_end   || '');
    if (esD) { var eEnd = eeD || esD; if (esD <= mEnd && eEnd >= mStart) return true; }
    if (pubD && pubD >= mStart && pubD <= mEnd) return true;
    return false;
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB-2 장르/이벤트 필터 / TAB-3 카테고리 필터
// ═══════════════════════════════════════════════════════════════════════════
function setEtype(btn) {
  document.querySelectorAll('[data-etype]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  ETYPE_FILTER = btn.dataset.etype;
  if (ACTIVE_TAB === 'schedule') renderScheduleTab();
}

function applyFilters(articles) {
  return articles.filter(function(a) {
    if (ETYPE_FILTER !== '전체' && (a.event_type || '') !== ETYPE_FILTER) return false;
    return true;
  });
}

function setIndCat(btn) {
  document.querySelectorAll('[data-indcat]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  IND_CAT_FILTER = btn.dataset.indcat;
  if (ACTIVE_TAB === 'industry') renderIndustryTab();
}

function matchIndCat(a) {
  if (IND_CAT_FILTER === '전체') return true;
  var cat = a.cat_html || '';
  if (IND_CAT_FILTER === '기타') {
    var allKnown = new Set();
    Object.values(IND_CAT_MAP).forEach(function(s){ if (s) s.forEach(function(v){ allKnown.add(v); }); });
    return !allKnown.has(cat);
  }
  var allowed = IND_CAT_MAP[IND_CAT_FILTER];
  if (!allowed) return true;
  return allowed.has(cat);
}

// ═══════════════════════════════════════════════════════════════════════════
// ARTICLE CLASSIFICATION
// ═══════════════════════════════════════════════════════════════════════════
function isExcluded(a) {
  if (SAFE_ET.has(a.event_type || '')) return false;
  var t = cleanT(a.cleaned_title || a.title || '').toLowerCase();
  if (EXCL_HARD.some(function(k){ return t.indexOf(k) !== -1; })) return true;
  if (!NEW_ET.has(a.event_type || '') && EXCL_SOFT.some(function(k){ return t.indexOf(k) !== -1; })) return true;
  return false;
}

function isNewRelease(a) {
  var cat = a.cat_html || a.category || '';
  if (IND_CATS.has(cat)) return false;
  if (isExcluded(a)) return false;
  return a.is_new_event || NEW_ET.has(a.event_type || '') || cat === '신작 소식';
}

function isIndustry(a) { return !isNewRelease(a); }

// ═══════════════════════════════════════════════════════════════════════════
// KPI
// ═══════════════════════════════════════════════════════════════════════════
function updateKpi(articles) {
  var t  = today0();
  var wr = weekRange();
  var launch = [], cbtList = [], weekList = [], preList = [];

  articles.filter(isNewRelease).forEach(function(a) {
    var et  = a.event_type || '';
    var esD = kst(a.event_start || '');
    var eeD = kst(a.event_end   || '');
    var gn  = compressTitle(a.cleaned_title || a.title || '');

    if (et === '출시' && esD) {
      var d = new Date(esD.getFullYear(), esD.getMonth(), esD.getDate());
      if (d.getTime() === t.getTime()) launch.push({ name: gn, date: fmtDate(a.event_start), badge: '출시' });
    }
    if ((et === 'CBT' || et === 'OBT') && esD) {
      var es = new Date(esD.getFullYear(), esD.getMonth(), esD.getDate());
      var ee = eeD ? new Date(eeD.getFullYear(), eeD.getMonth(), eeD.getDate()) : es;
      if (es <= t && t <= ee) cbtList.push({ name: gn, date: fmtDate(a.event_start) + (a.event_end ? '~' + fmtDate(a.event_end) : ''), badge: et });
    }
    if ((et === '출시' || et === 'OBT') && esD) {
      var es2 = new Date(esD.getFullYear(), esD.getMonth(), esD.getDate());
      if (es2 >= wr.mon && es2 <= wr.sun) weekList.push({ name: gn, date: fmtDate(a.event_start), badge: et });
    }
    if (et === '사전예약' && esD) {
      var es3 = new Date(esD.getFullYear(), esD.getMonth(), esD.getDate());
      var ee3 = eeD ? new Date(eeD.getFullYear(), eeD.getMonth(), eeD.getDate()) : new Date(9999,0,1);
      if (es3 <= t && t <= ee3) preList.push({ name: gn, date: fmtDate(a.event_start), badge: '사전예약' });
    }
  });

  document.getElementById('kv-launch').textContent = launch.length;
  document.getElementById('kv-cbt').textContent    = cbtList.length;
  document.getElementById('kv-week').textContent   = weekList.length;
  document.getElementById('kv-pre').textContent    = preList.length;
  renderKpiList('kpl-launch', launch);
  renderKpiList('kpl-cbt',    cbtList);
  renderKpiList('kpl-week',   weekList);
  renderKpiList('kpl-pre',    preList);
}

function renderKpiList(id, list) {
  var el = document.getElementById(id);
  if (!list.length) { el.innerHTML = '<div class="kpi-empty">해당 없음</div>'; return; }
  el.innerHTML = list.map(function(g) {
    return '<div class="kpi-panel-item"><span class="game-name">' + esc(g.name) + '</span>' +
      '<span class="game-date">' + esc(g.date) + '</span>' +
      '<span class="game-badge">' + esc(g.badge) + '</span></div>';
  }).join('');
}

function toggleKpi(id) {
  document.querySelectorAll('.kpi-item').forEach(function(el) {
    el.classList.toggle('active', el.id === id && !el.classList.contains('active'));
  });
  event.stopPropagation();
}
document.addEventListener('click', function() {
  document.querySelectorAll('.kpi-item').forEach(function(el){ el.classList.remove('active'); });
});

// ═══════════════════════════════════════════════════════════════════════════
// ARTICLE STORE
// ═══════════════════════════════════════════════════════════════════════════
var _articleStore = [];
function storeArticle(a) { _articleStore.push(a); return _articleStore.length - 1; }
function resetStore()     { _articleStore = []; }

// ═══════════════════════════════════════════════════════════════════════════
// TAG HELPER
// ═══════════════════════════════════════════════════════════════════════════
function makeTags(cat, et, genre, src, isNew) {
  return (cat   ? '<span class="nc-tag tag-cat">'   + esc(cat)   + '</span>' : '') +
         (et    ? '<span class="nc-tag tag-et">'     + esc(et)    + '</span>' : '') +
         (genre ? '<span class="nc-tag tag-genre">'  + esc(genre) + '</span>' : '') +
         (src   ? '<span class="nc-tag tag-src">'    + esc(src)   + '</span>' : '') +
         (isNew ? '<span class="nc-tag tag-new">NEW</span>' : '');
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB-1: 신작 기사 렌더 (날짜 범위 기반)
// ═══════════════════════════════════════════════════════════════════════════
function renderArticlesTab() {
  var newArticles = ALL_ARTICLES.filter(inRange).filter(isNewRelease);
  resetStore();

  var heroes   = newArticles.slice(0, 3);
  var rest     = newArticles.slice(3);
  var featured = rest.slice(0, 6);
  var normal   = rest.slice(6);

  renderHero(heroes);
  renderFeatured(featured);
  renderArticleList(normal);

  var cnt = newArticles.length;
  var cntEl = document.getElementById('dr-count');
  if (cntEl) cntEl.textContent = cnt ? '신작 ' + cnt + '건' : '';
  document.getElementById('h-stat').innerHTML = '신작 <b>' + cnt + '</b>건';

  if (!cnt) {
    document.getElementById('hero-hd').style.display  = 'none';
    document.getElementById('hero-section').innerHTML = '';
    document.getElementById('feat-hd').style.display  = 'none';
    document.getElementById('feat-grid').innerHTML    = '';
    document.getElementById('list-hd').style.display  = 'none';
    document.getElementById('list-section').innerHTML =
      '<div class="empty"><div class="empty-icon">🎮</div><div class="empty-msg">해당 기간에 신작 기사가 없습니다</div></div>';
  }
}

function renderHero(articles) {
  var hdEl  = document.getElementById('hero-hd');
  var secEl = document.getElementById('hero-section');
  if (!articles.length) { hdEl.style.display = 'none'; secEl.innerHTML = ''; return; }
  hdEl.style.display = '';
  document.getElementById('hero-count').textContent = articles.length + '건';
  secEl.innerHTML = articles.map(function(a) {
    var title   = cleanT(a.cleaned_title || a.title || '');
    var summary = a.summary || '';
    var dateStr = fmtDate(a.event_start || a.pub_date || a.collected_at || '');
    var idx     = storeArticle(a);
    return '<div class="hero-card" onclick="openModalByIdx(' + idx + ')">' +
      '<div class="hero-left">' +
        '<div class="hero-tags">' + makeTags(a.cat_html||'', a.event_type||'', a.genre||'', a.source_name||'', a.is_new_event) + '</div>' +
        '<div class="hero-title">' + esc(title) + '</div>' +
        (summary ? '<div class="hero-summary">' + esc(summary) + '</div>' : '') +
        '<div class="hero-meta">' + esc(dateStr) + '</div>' +
      '</div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB-2: 신작 일정 렌더 (월간 달력)
// ═══════════════════════════════════════════════════════════════════════════
var SCHED_ET = new Set(['사전예약','CBT','OBT','출시','신규서버','소프트론칭','얼리액세스']);

function isScheduleItem(a) {
  if (!a.event_start && !a.event_end) return false;
  return SCHED_ET.has(a.event_type || '');
}

function truncTitle(t, maxLen) {
  if (!t) return '';
  maxLen = maxLen || 14;
  if (t.length > maxLen) return t.slice(0, maxLen - 1) + '…';
  return t;
}

function renderCalendar(articles) {
  var wrap = document.getElementById('cal-wrap');
  if (!wrap) return;

  var y = CUR_MONTH.y, m = CUR_MONTH.m;
  var firstDay  = new Date(y, m - 1, 1);
  var lastDay   = new Date(y, m, 0);
  var totalDays = lastDay.getDate();
  var startDow  = firstDay.getDay(); // 0=일
  var todayD    = today0();

  // 일정 아이템 필터링 (isScheduleItem + ETYPE_FILTER)
  var items = articles.filter(isScheduleItem);
  if (ETYPE_FILTER !== '전체') {
    items = items.filter(function(a){ return (a.event_type || '') === ETYPE_FILTER; });
  }

  if (!items.length) {
    wrap.innerHTML = '<div class="cal-empty">🗓️ 이번 달 해당 일정이 없습니다</div>';
    return;
  }

  // 날짜별 이벤트 맵 (event_start 기준, 해당 월에 속하는 날짜만)
  var dayMap = {};
  items.forEach(function(a) {
    var esD = kst(a.event_start);
    if (!esD) return;
    // event_start 가 이번 달이면 해당 날짜 셀에 표시
    if (esD.getFullYear() === y && esD.getMonth() + 1 === m) {
      var d = esD.getDate();
      if (!dayMap[d]) dayMap[d] = [];
      dayMap[d].push(a);
    }
    // event_end 가 이번 달이고 시작일이 이번 달이 아닌 경우, 종료일 셀에도 표시
    if (a.event_end) {
      var eeD = kst(a.event_end);
      if (eeD && eeD.getFullYear() === y && eeD.getMonth() + 1 === m) {
        var esYear = esD.getFullYear(), esMon = esD.getMonth() + 1;
        if (esYear !== y || esMon !== m) {
          var d2 = eeD.getDate();
          if (!dayMap[d2]) dayMap[d2] = [];
          dayMap[d2].push(a);
        }
      }
    }
  });

  // 요일 헤더
  var DOWS = ['일','월','화','수','목','금','토'];
  var html = '<div class="cal-grid">';
  DOWS.forEach(function(d){ html += '<div class="cal-dow">' + d + '</div>'; });

  // 이전 달 빈칸
  var prevMonthDays = new Date(y, m - 1, 0).getDate();
  for (var i = 0; i < startDow; i++) {
    var prevD = prevMonthDays - startDow + 1 + i;
    html += '<div class="cal-cell out-month"><div class="cal-date">' + prevD + '</div></div>';
  }

  // 이번 달 날짜
  for (var d = 1; d <= totalDays; d++) {
    var cellDate = new Date(y, m - 1, d);
    var isToday  = (cellDate.getTime() === todayD.getTime());
    html += '<div class="cal-cell' + (isToday ? ' is-today' : '') + '">';
    html += '<div class="cal-date">' + d + '</div>';
    var dayItems = dayMap[d] || [];
    dayItems.forEach(function(a) {
      var et    = a.event_type || '';
      var cls   = 'et-' + (et || 'default');
      var full  = compressTitle(a.cleaned_title || a.title || '');
      var label = truncTitle(full, 13);
      var idx   = storeArticle(a);
      html += '<span class="cal-pill ' + esc(cls) + '" onclick="event.stopPropagation();openModalByIdx(' + idx + ')" title="' + esc(full) + '">' + esc(label) + '</span>';
    });
    html += '</div>';
  }

  // 다음 달 빈칸
  var totalCells = startDow + totalDays;
  var remainder  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (var n = 1; n <= remainder; n++) {
    html += '<div class="cal-cell out-month"><div class="cal-date">' + n + '</div></div>';
  }

  html += '</div>';
  wrap.innerHTML = html;
}

function renderScheduleTab() {
  var mArticles = getMonthArticles();
  resetStore();
  renderCalendar(mArticles);
  var cnt = mArticles.filter(isScheduleItem).length;
  document.getElementById('h-stat').innerHTML =
    '일정 <b>' + cnt + '</b>건 / ' + CUR_MONTH.y + '.' + String(CUR_MONTH.m).padStart(2,'0');
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB-3: 업계 뉴스 렌더
// ═══════════════════════════════════════════════════════════════════════════
function renderIndustryTab() {
  var mArticles = getMonthArticles();
  var indFiltered = mArticles.filter(isIndustry).filter(matchIndCat);
  var el = document.getElementById('ind-list');
  if (!indFiltered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📰</div><div class="empty-msg">이번 달 업계 뉴스가 없습니다</div></div>';
    document.getElementById('h-stat').innerHTML = '업계 <b>0</b>건';
    return;
  }
  el.innerHTML = indFiltered.map(function(a) {
    var title   = cleanT(a.cleaned_title || a.title || '');
    var cat     = a.cat_html    || '';
    var src     = a.source_name || '';
    var dateStr = fmtDate(a.pub_date || a.collected_at || '');
    var idx     = storeArticle(a);
    return '<div class="ind-card" onclick="openModalByIdx(' + idx + ')">' +
      '<div class="ind-header">' +
        (cat ? '<span class="ind-cat">' + esc(cat) + '</span>' : '') +
        '<span class="ind-title">' + esc(title) + '</span>' +
      '</div>' +
      '<div class="ind-meta">' + esc(src) + (dateStr ? ' · ' + dateStr : '') + '</div>' +
    '</div>';
  }).join('');
  document.getElementById('h-stat').innerHTML =
    '업계 <b>' + indFiltered.length + '</b>건 / ' + CUR_MONTH.y + '.' + String(CUR_MONTH.m).padStart(2,'0');
}

// ═══════════════════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════════════════
function openModalByIdx(idx) { openModal(_articleStore[idx]); }

function openModal(a) {
  if (!a) return;
  var title   = cleanT(a.cleaned_title || a.title || '');
  var summary = a.summary   || '';
  var body    = a.body_text || a.body || '';
  var link    = a.link      || a.url  || '';
  var dateStr = a.event_start
    ? fmtDate(a.event_start) + (a.event_end ? ' ~ ' + fmtDate(a.event_end) : '')
    : fmtDate(a.pub_date || a.collected_at || '');

  document.getElementById('modal-tags').innerHTML =
    makeTags(a.cat_html||'', a.event_type||'', a.genre||'', a.source_name||'', false);
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-meta').textContent  = dateStr;

  var summEl = document.getElementById('modal-summary');
  if (summary) { summEl.textContent = summary; summEl.style.display = ''; }
  else          { summEl.style.display = 'none'; }
  document.getElementById('modal-body').textContent = body || (summary ? '' : '본문 없음');

  var linkEl = document.getElementById('modal-link');
  if (link) { linkEl.href = link; linkEl.style.display = ''; }
  else        { linkEl.style.display = 'none'; }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOnBg(e) { if (e.target === document.getElementById('modal')) closeModal(); }
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

// ═══════════════════════════════════════════════════════════════════════════
// TAB SWITCH
// ═══════════════════════════════════════════════════════════════════════════
function switchTab(id, btn) {
  ACTIVE_TAB = id;
  document.querySelectorAll('.tab-page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (!ALL_ARTICLES.length) return; // 데이터 미로드 시 스킵
  if      (id === 'articles') renderArticlesTab();
  else if (id === 'schedule') { updateMonthNavActive(); renderScheduleTab(); }
  else if (id === 'industry') renderIndustryTab();
}

// DATA LOAD
// ═══════════════════════════════════════════════════════════════════════════
function showSkeleton() {
  document.getElementById('hero-section').innerHTML =
    '<div class="skeleton skel-card" style="height:90px;margin:12px 20px;"></div>' +
    '<div class="skeleton skel-card" style="height:90px;margin:12px 20px;"></div>';
}

async function loadDates() {
  try {
    var r = await fetch(DATES_URL + '?v=' + Date.now());
    if (!r.ok) throw new Error('dates.json not found');
    var data = await r.json();
    DATES_LIST = data.dates || data || [];
    return DATES_LIST;
  } catch(e) { console.warn('dates.json:', e); return []; }
}

async function loadAllData() {
  showSkeleton();
  var dates = await loadDates();
  if (!dates.length) {
    document.getElementById('hero-section').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-msg">데이터를 불러올 수 없습니다.<br>크롤러를 실행해 주세요.</div></div>';
    return;
  }
  var recent  = dates.slice(-90);
  var results = await Promise.allSettled(recent.map(function(d) {
    return fetch(DATA_PATH + d + '.json?v=' + Date.now()).then(function(r){ return r.json(); });
  }));
  var seen = new Set();
  ALL_ARTICLES = [];
  results.forEach(function(r) {
    if (r.status !== 'fulfilled') return;
    var arr = Array.isArray(r.value) ? r.value : (r.value.articles || []);
    arr.forEach(function(a) {
      normalizeArticle(a); // 필드명 정규화
      var key = a.link || a.url || a.title;
      if (key && !seen.has(key)) { seen.add(key); ALL_ARTICLES.push(a); }
    });
  });
  ALL_ARTICLES.sort(function(a,b){
    return new Date(b.pub_date||b.collected_at||0) - new Date(a.pub_date||a.collected_at||0);
  });

  updateKpi(ALL_ARTICLES);
  renderArticlesTab(); // 초기 탭: 신작 기사
}
