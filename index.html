<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 업계 동향 — 2026년 04월 01일</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    .g-header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 28px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .logo { font-size: 15px; font-weight: 700; color: #58a6ff; letter-spacing: -0.3px; }
    .logo .logo-sub { color: #8b949e; font-weight: 400; font-size: 12px; margin-left: 10px; }
    .header-r { display: flex; align-items: center; gap: 20px; }
    .h-stat { font-size: 12px; color: #8b949e; }
    .h-stat b { color: #e6edf3; }

    /* ── Search ── */
    .search-bar {
      padding: 14px 28px 0;
      max-width: 520px;
    }
    .search-input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 9px 16px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #58a6ff; }
    .search-input::placeholder { color: #6e7681; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      line-height: 1.5;
    }
    .bcat-new    { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb55; }
    .bcat-game   { background: #23863622; color: #3fb950; border: 1px solid #23863655; }
    .bcat-co     { background: #6e40c922; color: #bc8cff; border: 1px solid #6e40c955; }
    .bcat-gen    { background: #21262d;   color: #8b949e; border: 1px solid #30363d; }
    .bsrc-dom    { background: #1f3a5f22; color: #79c0ff; border: 1px solid #1f3a5f55; }
    .bsrc-ovs    { background: #3d1f1f22; color: #ff9e9e; border: 1px solid #3d1f1f55; }
    .bsite       { background: #21262d;   color: #8b949e; border: 1px solid #30363d; }
    .bhot        { background: #da363322; color: #ff7b72; border: 1px solid #da363355; }
    .bview       { background: #21262d;   color: #f0883e; border: 1px solid #30363d; }

    /* ── Hero Section ── */
    .hero-sec { padding: 22px 28px 4px; }
    .sec-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #8b949e;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .hero-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 118px;
    }
    .hero-card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(88, 166, 255, 0.1);
    }
    .hero-card.span2 { grid-column: span 2; min-height: 136px; }

    .hc-top { display: flex; align-items: flex-start; gap: 8px; }
    .hc-rank {
      font-size: 12px;
      font-weight: 800;
      min-width: 22px;
      padding-top: 1px;
      flex-shrink: 0;
    }
    .hc-rank.r1 { color: #f0883e; }
    .hc-rank.r2 { color: #c9d1d9; }
    .hc-rank.r3 { color: #8b949e; }
    .hc-rank.rn { color: #6e7681; }
    .hc-title {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      line-height: 1.45;
    }
    .hero-card.span2 .hc-title { font-size: 16px; }
    .hero-card:hover .hc-title { color: #58a6ff; }

    .hc-summary {
      font-size: 12px;
      color: #8b949e;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hc-foot { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-top: auto; }

    /* ── Divider ── */
    .divider { height: 1px; background: #21262d; margin: 20px 28px; }

    /* ── Board Sections ── */
    .board-sec { margin: 0 28px 32px; }
    .board-hd {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0 10px;
      border-bottom: 2px solid;
      margin-bottom: 2px;
    }
    .board-hd.new  { border-color: #1f6feb; }
    .board-hd.game { border-color: #238636; }
    .board-hd.co   { border-color: #6e40c9; }
    .board-hd.gen  { border-color: #30363d; }

    .board-hd-title { font-size: 15px; font-weight: 700; }
    .board-hd.new  .board-hd-title { color: #58a6ff; }
    .board-hd.game .board-hd-title { color: #3fb950; }
    .board-hd.co   .board-hd-title { color: #bc8cff; }
    .board-hd.gen  .board-hd-title { color: #8b949e; }

    .board-hd-cnt {
      font-size: 11px;
      color: #8b949e;
      background: #21262d;
      padding: 2px 9px;
      border-radius: 10px;
    }

    /* Board row */
    .brow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid #21262d;
      transition: background 0.1s;
    }
    .brow:last-child { border-bottom: none; }
    .brow:hover { background: #161b22; border-radius: 6px; }
    .brow-num { font-size: 12px; color: #6e7681; min-width: 26px; text-align: right; flex-shrink: 0; }
    .brow-title {
      flex: 1;
      font-size: 13px;
      color: #e6edf3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
    }
    .brow-title:hover { color: #58a6ff; }
    .brow-meta { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .brow-views { font-size: 11px; color: #6e7681; min-width: 52px; text-align: right; }
    .brow-views.hot { color: #f0883e; }

    /* Empty */
    .brow-empty { text-align: center; color: #6e7681; padding: 28px; font-size: 13px; }

    /* ── Footer ── */
    .g-footer {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 18px 28px;
      text-align: center;
      font-size: 12px;
      color: #6e7681;
      margin-top: 40px;
    }

    /* ── Responsive ── */
    @media (max-width: 820px) {
      .hero-grid { grid-template-columns: 1fr 1fr; }
      .hero-card.span2 { grid-column: span 2; }
    }
    @media (max-width: 540px) {
      .hero-grid { grid-template-columns: 1fr; }
      .hero-card.span2 { grid-column: auto; }
      .g-header { padding: 0 14px; }
      .hero-sec, .board-sec, .search-bar { padding-left: 14px; padding-right: 14px; }
      .divider { margin: 14px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="g-header">
  <div class="logo">🎮 게임 업계 동향 <span class="logo-sub">2026년 04월 01일</span></div>
  <div class="header-r">
    <span class="h-stat">총 <b id="totalCnt">-</b>건</span>
    <span class="h-stat">수집완료 <b>15:30 KST</b></span>
  </div>
</header>

<!-- Search -->
<div class="search-bar">
  <input type="text" id="searchInput" class="search-input" placeholder="기사 제목 검색...">
</div>

<!-- Hero: TOP 5 -->
<section class="hero-sec">
  <div class="sec-eyebrow">🔥 주목 기사 TOP 5</div>
  <div class="hero-grid" id="heroGrid"></div>
</section>

<div class="divider"></div>

<!-- Board Sections -->
<div id="boardWrap"></div>

<!-- Footer -->
<footer class="g-footer">
  게임 업계 동향 크롤러 v2.0 &nbsp;|&nbsp; 2026년 04월 01일 15:30 KST 수집
</footer>

  // ── 카테고리 정의 ──
  var CAT_ORDER = ["신작 소식", "게임 소식", "게임 회사 동향", "일반"];
  var CAT_CLS   = { "신작 소식": "new", "게임 소식": "game", "게임 회사 동향": "co", "일반": "gen" };
  var CAT_BCLS  = { "신작 소식": "bcat-new", "게임 소식": "bcat-game", "게임 회사 동향": "bcat-co", "일반": "bcat-gen" };
  var CAT_LABEL = { "신작 소식": "🆕 신작 소식", "게임 소식": "🎮 게임 소식", "게임 회사 동향": "🏢 게임 회사 동향", "일반": "📰 일반" };

  // ── 정렬 점수 (조회수 우선, 루리웹 베스트 가산) ──
  function score(a) {
    var base = a.views || 0;
    if (a.is_ruliweb_best) base += 50000;
    var catBonus = { "신작 소식": 400, "게임 회사 동향": 300, "게임 소식": 200, "일반": 0 };
    return base + (catBonus[a.category] || 0);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function badgeSrc(a) {
    return a.is_domestic
      ? '<span class="badge bsrc-dom">국내</span>'
      : '<span class="badge bsrc-ovs">해외</span>';
  }

  function badgeCat(cat) {
    var cls = CAT_BCLS[cat] || "bcat-gen";
    return '<span class="badge ' + cls + '">' + esc(cat) + "</span>";
  }

  // ── 히어로 카드 렌더 ──
  function renderHero(a, rank) {
    var rankCls = rank === 1 ? "r1" : rank === 2 ? "r2" : rank === 3 ? "r3" : "rn";
    var spanCls = rank === 1 ? "span2" : "";
    var summary = (a.summary && a.summary.trim().length > 10)
      ? '<div class="hc-summary">' + esc(a.summary) + "</div>"
      : "";
    var viewBadge = a.views > 0
      ? '<span class="badge bview">👁 ' + a.views.toLocaleString() + "</span>"
      : "";
    var hotBadge = a.is_ruliweb_best ? '<span class="badge bhot">HOT</span>' : "";

    return (
      '<div class="hero-card ' + spanCls + '" onclick="window.open(\'' + esc(a.url) + "', '_blank')" + '">' +
        '<div class="hc-top">' +
          '<span class="hc-rank ' + rankCls + '">#' + rank + "</span>" +
          '<div class="hc-title">' + esc(a.title) + "</div>" +
        "</div>" +
        summary +
        '<div class="hc-foot">' +
          badgeCat(a.category) +
          badgeSrc(a) +
          '<span class="badge bsite">' + esc(a.site) + "</span>" +
          hotBadge +
          viewBadge +
        "</div>" +
      "</div>"
    );
  }

  // ── 게시판 행 렌더 ──
  function renderRow(a, num) {
    var viewHtml = a.views > 0
      ? '<span class="brow-views hot">👁 ' + a.views.toLocaleString() + "</span>"
      : '<span class="brow-views"></span>';
    var hotBadge = a.is_ruliweb_best ? '<span class="badge bhot">HOT</span>' : "";

    return (
      '<div class="brow">' +
        '<span class="brow-num">' + num + "</span>" +
        '<a class="brow-title" href="' + esc(a.url) + '" target="_blank" title="' + esc(a.title) + '">' + esc(a.title) + "</a>" +
        '<div class="brow-meta">' +
          badgeSrc(a) +
          '<span class="badge bsite">' + esc(a.site) + "</span>" +
          hotBadge +
          viewHtml +
        "</div>" +
      "</div>"
    );
  }

  // ── 메인 렌더 ──
  function render(data) {
    document.getElementById("totalCnt").textContent = data.length;

    var sorted = data.slice().sort(function (a, b) { return score(b) - score(a); });

    // Hero TOP 5
    var top5 = sorted.slice(0, 5);
    document.getElementById("heroGrid").innerHTML =
      top5.map(function (a, i) { return renderHero(a, i + 1); }).join("");

    // Board sections
    var wrap = document.getElementById("boardWrap");
    wrap.innerHTML = CAT_ORDER.map(function (cat) {
      var items = sorted.filter(function (a) { return a.category === cat; });
      var cls = CAT_CLS[cat] || "gen";
      var label = CAT_LABEL[cat] || cat;
      var rows = items.length > 0
        ? items.map(function (a, i) { return renderRow(a, i + 1); }).join("")
        : '<div class="brow-empty">해당 기사 없음</div>';
      return (
        '<section class="board-sec">' +
          '<div class="board-hd ' + cls + '">' +
            '<span class="board-hd-title">' + label + "</span>" +
            '<span class="board-hd-cnt">' + items.length + "건</span>" +
          "</div>" +
          rows +
        "</section>"
      );
    }).join("");
  }

  // ── 검색 ──
  document.getElementById("searchInput").addEventListener("input", function () {
    var q = this.value.trim().toLowerCase();
    render(q ? DATA.filter(function (a) { return a.title.toLowerCase().indexOf(q) !== -1; }) : DATA);
  });

  // 초기 렌더
  render(DATA);
}());
</script>
